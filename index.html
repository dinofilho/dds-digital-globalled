<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDS Digital | GLOBALLED SST</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#031b1c,#062f31);color:white;padding:18px}
.container{max-width:950px;margin:auto;background:#061f21;padding:24px;border-radius:24px;box-shadow:0 0 30px rgba(0,255,180,.25)}
.logo{display:block;margin:0 auto 15px;max-width:145px;border-radius:20px}
h1{text-align:center;color:#00ffae;font-size:34px}
.card{background:#082426;border:1px solid #16887d;border-radius:20px;padding:18px;margin-top:20px}
label{font-weight:bold;margin-top:13px;display:block}
input,select,textarea{width:100%;padding:15px;margin-top:7px;border:1px solid #16887d;border-radius:14px;background:#063638;color:white;font-size:16px;box-sizing:border-box}
textarea{min-height:130px}
button{width:100%;padding:17px;margin-top:16px;border:none;border-radius:14px;background:#009b68;color:white;font-size:18px;font-weight:bold}
.btn2{background:#004aad}.btn3{background:#8b0000}
.participante{border:1px solid #16887d;padding:14px;border-radius:16px;margin-top:12px;background:#061b1d}
canvas{background:white;border-radius:12px;width:100%;height:160px;touch-action:none}
.pdf{background:white;color:#111;padding:26px;border-radius:12px;font-family:Arial,sans-serif}
.pdf h1,.pdf h2{color:#004d40}
.small{font-size:12px;color:#333}
</style>
</head>

<body>

<div class="container">
<img class="logo" src="https://globalledsst.com.br/img/logo.png" onerror="this.style.display='none'">

<h1>DDS DIGITAL GLOBALLED SST</h1>
<p style="text-align:center">Diálogo Diário de Segurança com participantes, ciência, assinatura, PDF e integração com painel GLOBALLED.</p>

<div class="card">
<h2>Cliente / Empresa</h2>

<label>Selecionar cliente cadastrado</label>
<select id="clienteSelect" onchange="preencherCliente()">
<option value="">Selecione o cliente</option>
</select>

<label>Empresa</label>
<input id="empresa" placeholder="Nome da empresa">

<label>CNPJ</label>
<input id="cnpj" placeholder="CNPJ">

<label>Setor / Local</label>
<input id="setor" placeholder="Setor ou local da atividade">

<label>Responsável pelo DDS</label>
<input id="responsavel" placeholder="Nome do responsável">

<label>Função do responsável</label>
<input id="funcaoResp" placeholder="Função">
</div>

<div class="card">
<h2>Tema do DDS</h2>

<label>Tema</label>
<select id="tema" onchange="carregarTema()">
<option value="">Selecione o tema</option>
<option>Uso correto de EPI</option>
<option>Trabalho em altura NR-35</option>
<option>Eletricidade NR-10</option>
<option>Espaço confinado NR-33</option>
<option>Máquinas e equipamentos NR-12</option>
<option>Inflamáveis NR-20</option>
<option>Ergonomia</option>
<option>Incêndio e emergência</option>
<option>Ordem e limpeza</option>
<option>Direção defensiva</option>
<option>Produtos químicos</option>
<option>Quase acidente</option>
<option>Riscos psicossociais</option>
<option>Outro</option>
</select>

<label>Conteúdo do DDS</label>
<textarea id="conteudo"></textarea>

<label>Medidas preventivas / Orientações</label>
<textarea id="medidas" placeholder="Descreva as principais orientações dadas aos colaboradores"></textarea>
</div>

<div class="card">
<h2>Participantes</h2>
<div id="participantes"></div>
<button onclick="addParticipante()">+ ADICIONAR COLABORADOR</button>
</div>

<div class="card">
<h2>Assinatura do Responsável</h2>
<canvas id="assinatura"></canvas>
<button class="btn3" onclick="limparAssinatura()">LIMPAR ASSINATURA</button>
</div>

<button onclick="salvarNoSupabase()">SALVAR NO PAINEL GLOBALLED</button>
<button onclick="gerarPDF()">GERAR PDF DO DDS</button>
<button class="btn2" onclick="enviarWhatsApp()">ENVIAR RESUMO PELO WHATSAPP</button>

<div id="areaPDF" style="display:none"></div>
</div>

<script>
const SUPABASE_URL = "https://cujjdzfhicinarumphjq.supabase.co";
const SUPABASE_KEY = "sb_publishable_XYp2Y75G8UTgMskNVfM3GA_Ybzrh9Fi";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let clientes = [];

async function carregarClientes(){
 const {data,error}=await db.from("clientes").select("*").order("empresa");
 if(error){ alert("Erro ao carregar clientes: " + error.message); return; }

 clientes=data||[];
 clienteSelect.innerHTML='<option value="">Selecione o cliente</option>';

 clientes.forEach(c=>{
  clienteSelect.innerHTML += `<option value="${c.id}">${c.empresa}</option>`;
 });
}
carregarClientes();

function preencherCliente(){
 const c=clientes.find(x=>x.id===clienteSelect.value);
 if(!c) return;
 empresa.value=c.empresa||"";
 cnpj.value=c.cnpj||"";
}

const textos={
"Uso correto de EPI":"O uso correto dos Equipamentos de Proteção Individual é fundamental para reduzir riscos de acidentes e doenças ocupacionais. Cada colaborador deve utilizar o EPI adequado à atividade, conservar o equipamento, comunicar danos e seguir as orientações da empresa.",
"Trabalho em altura NR-35":"Toda atividade realizada acima de 2 metros com risco de queda exige planejamento, análise prévia, uso correto de cinto de segurança, talabarte, ancoragem adequada e autorização para execução. A atenção deve ser constante.",
"Eletricidade NR-10":"Atividades com eletricidade exigem profissionais capacitados, bloqueio de energia, ferramentas adequadas, ausência de improvisos e respeito aos procedimentos de segurança.",
"Espaço confinado NR-33":"Antes de acessar espaço confinado, é necessário avaliar atmosfera, ventilação, comunicação, permissão de entrada, vigia e plano de emergência.",
"Máquinas e equipamentos NR-12":"Máquinas devem possuir proteções, dispositivos de segurança e operação segura. É proibido remover proteções ou realizar manutenção sem bloqueio.",
"Inflamáveis NR-20":"Ambientes com inflamáveis exigem controle de fontes de ignição, aterramento, sinalização, ventilação, procedimentos seguros e atenção redobrada.",
"Ergonomia":"A ergonomia busca adaptar o trabalho ao colaborador, prevenindo dores, fadiga, esforços repetitivos e afastamentos. Pausas e postura adequada são essenciais.",
"Incêndio e emergência":"Todos devem conhecer rotas de fuga, pontos de encontro, uso básico de extintores e procedimentos em caso de emergência.",
"Ordem e limpeza":"Ambiente limpo e organizado reduz quedas, acidentes, perdas de materiais e melhora a produtividade.",
"Direção defensiva":"Dirigir com segurança envolve atenção, respeito aos limites, distância segura, manutenção do veículo e prevenção de atitudes de risco.",
"Produtos químicos":"Produtos químicos devem ser manuseados com EPI adequado, identificação correta, leitura da FISPQ e armazenamento seguro.",
"Quase acidente":"Quase acidente é um alerta. Deve ser comunicado para prevenir ocorrências graves no futuro.",
"Riscos psicossociais":"Pressão excessiva, assédio, conflitos, sobrecarga e falta de apoio podem afetar a saúde mental. A comunicação segura e o respeito são fundamentais."
};

function carregarTema(){
 let t=tema.value;
 conteudo.value=textos[t]||"";
}

let total=0;
function addParticipante(){
 total++;
 let div=document.createElement("div");
 div.className="participante";
 div.innerHTML=`
 <label>Nome do colaborador ${total}</label>
 <input class="nomePart" placeholder="Nome completo">
 <label>Função</label>
 <input class="funcPart" placeholder="Função">
 <label><input type="checkbox" class="ciente"> Declaro que participei do DDS e estou ciente das orientações.</label>
 `;
 participantes.appendChild(div);
}
addParticipante();

const canvas=document.getElementById("assinatura");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
 canvas.width=canvas.offsetWidth;
 canvas.height=160;
 ctx.lineWidth=2;
 ctx.lineCap="round";
 ctx.strokeStyle="#000";
}

setTimeout(resizeCanvas,300);
window.addEventListener("resize",resizeCanvas);

let desenhando=false;

function pos(e){
 let r=canvas.getBoundingClientRect();
 let t=e.touches?e.touches[0]:e;
 return{x:t.clientX-r.left,y:t.clientY-r.top};
}

canvas.addEventListener("mousedown",e=>{
 desenhando=true;
 let p=pos(e);
 ctx.beginPath();
 ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("mousemove",e=>{
 if(!desenhando)return;
 let p=pos(e);
 ctx.lineTo(p.x,p.y);
 ctx.stroke();
});

canvas.addEventListener("mouseup",()=>desenhando=false);
canvas.addEventListener("mouseleave",()=>desenhando=false);

canvas.addEventListener("touchstart",e=>{
 desenhando=true;
 let p=pos(e);
 ctx.beginPath();
 ctx.moveTo(p.x,p.y);
 e.preventDefault();
});

canvas.addEventListener("touchmove",e=>{
 if(!desenhando)return;
 let p=pos(e);
 ctx.lineTo(p.x,p.y);
 ctx.stroke();
 e.preventDefault();
});

canvas.addEventListener("touchend",()=>desenhando=false);

function limparAssinatura(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function totalParticipantes(){
 return [...document.querySelectorAll(".nomePart")].filter(x=>x.value.trim()!=="").length;
}

async function salvarNoSupabase(){
 const {error}=await db.from("dds").insert({
  cliente_id: clienteSelect.value || null,
  tema: tema.value,
  responsavel: responsavel.value,
  participantes: totalParticipantes()
 });

 if(error){
  alert("Erro ao salvar: " + error.message);
  return;
 }

 alert("DDS salvo no painel GLOBALLED!");
}

async function gerarPDF(){
 const {jsPDF}=window.jspdf;

 let nomes=[...document.querySelectorAll(".nomePart")];
 let funcoes=[...document.querySelectorAll(".funcPart")];
 let cientes=[...document.querySelectorAll(".ciente")];

 let lista="";
 nomes.forEach((n,i)=>{
  lista+=`
  <tr>
  <td>${i+1}</td>
  <td>${n.value}</td>
  <td>${funcoes[i].value}</td>
  <td>${cientes[i].checked ? "Ciente" : "Não marcado"}</td>
  </tr>`;
 });

 let hoje=new Date().toLocaleString("pt-BR");
 let ass=canvas.toDataURL();

 areaPDF.style.display="block";
 areaPDF.innerHTML=`
 <div class="pdf" id="pdfFinal">
 <img src="https://globalledsst.com.br/img/logo.png" style="max-width:110px;display:block;margin:0 auto 10px">
 <h1>DDS DIGITAL - GLOBALLED SST</h1>
 <p><b>Data:</b> ${hoje}</p>
 <p><b>Empresa:</b> ${empresa.value}</p>
 <p><b>CNPJ:</b> ${cnpj.value}</p>
 <p><b>Setor:</b> ${setor.value}</p>
 <p><b>Responsável:</b> ${responsavel.value} - ${funcaoResp.value}</p>

 <h2>Tema</h2>
 <p>${tema.value}</p>

 <h2>Conteúdo</h2>
 <p style="white-space:pre-line;text-align:justify;">${conteudo.value}</p>

 <h2>Medidas Preventivas</h2>
 <p style="white-space:pre-line;text-align:justify;">${medidas.value}</p>

 <h2>Participantes</h2>
 <table border="1" width="100%" cellspacing="0" cellpadding="6">
 <tr><th>Nº</th><th>Nome</th><th>Função</th><th>Ciência</th></tr>
 ${lista}
 </table>

 <h2>Assinatura do Responsável</h2>
 <img src="${ass}" style="width:330px;border:1px solid #ccc">

 <p class="small">Documento gerado digitalmente pelo sistema DDS Digital GLOBALLED SST.</p>
 </div>`;

 let el=document.getElementById("pdfFinal");
 let canvasPDF=await html2canvas(el,{scale:2,useCORS:true});
 let img=canvasPDF.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");
 let largura=210;
 let altura=canvasPDF.height*largura/canvasPDF.width;

 if(altura<=297){
  pdf.addImage(img,"PNG",0,0,largura,altura);
 }else{
  let pos=0;
  while(pos<altura){
   pdf.addImage(img,"PNG",0,-pos,largura,altura);
   pos+=297;
   if(pos<altura) pdf.addPage();
  }
 }

 pdf.save("DDS-Digital-Globalled.pdf");
}

function enviarWhatsApp(){
 let msg=
 `DDS DIGITAL GLOBALLED SST%0A%0A`+
 `Empresa: ${empresa.value}%0A`+
 `Tema: ${tema.value}%0A`+
 `Responsável: ${responsavel.value}%0A`+
 `Participantes: ${totalParticipantes()}%0A`+
 `Data: ${new Date().toLocaleString("pt-BR")}%0A%0A`+
 `Registro criado pelo sistema DDS Digital.`;

 window.open(`https://wa.me/551433224141?text=${msg}`,"_blank");
}
</script>

</body>
</html>
